<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPP Web App</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script type="module" src="/js/main.js"></script>
</head>
<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <button id="sidebarToggle" type="button" aria-label="Toggle sidebar">Menu</button>
      <nav>
        <ul>
          <li><button type="button" data-page="products">Products</button></li>
          <li><button type="button" data-page="import">Import</button></li>
          <li><button type="button" data-page="vendors">Vendors</button></li>
          <li><button type="button" disabled>Logs</button></li>
        </ul>
      </nav>
    </aside>

    <main class="main">
      <section id="productsPage" class="page">
        <h1>Product Availability</h1>

        <input
          type="text"
          id="searchInput"
          placeholder="Search SKU..."
          class="search-bar"
        >

        <table>
          <thead>
            <tr>
              <th>SKU</th>
              <th>Vendor</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

        <div id="pagination"></div>
      </section>

      <section id="importPage" class="page hidden">
        <h1>Import Parts</h1>

        <form id="importForm">
          <input type="file" name="file" accept=".csv,text/csv" required>
          <button type="submit">Upload CSV</button>
        </form>
      </section>

      <section id="vendorsPage" class="page hidden">
        <section id="vendorListView">
          <h1>Vendors</h1>

          <div class="vendor-list-panel" aria-label="Vendor list">
            <table>
              <thead>
                <tr>
                  <th>Vendor</th>
                  <th>Products</th>
                  <th>Available</th>
                  <th>Backordered</th>
                </tr>
              </thead>
              <tbody id="vendorsTableBody"></tbody>
            </table>
          </div>
        </section>

        <section id="vendorProductsView" class="hidden" aria-label="Vendor products">
          <button id="backToVendorsButton" class="secondary-action" type="button">Back to vendors</button>

          <div class="vendor-products-header">
            <h1 id="selectedVendorTitle">Vendor Products</h1>
            <p id="selectedVendorCount"></p>
          </div>

          <table>
            <thead>
              <tr>
                <th>SKU</th>
                <th>Status</th>
                <th>Last Updated</th>
              </tr>
            </thead>
            <tbody id="vendorProductsTableBody"></tbody>
          </table>
        </section>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>

      <div id="notesList"></div>

      <div class="note-input-container">
        <input
          type="text"
          id="newNote"
          placeholder="Add note..."
        >
        <button class="send-btn" id="addNoteButton" type="button">Send</button>
      </div>

      <button id="closeModalButton" type="button">Close</button>
    </div>
  </div>
</body>
</html>
